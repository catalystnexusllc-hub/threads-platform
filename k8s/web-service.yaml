# ── k8s/web-service.yaml ──────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: threads
  labels:
    app: threads-web
spec:
  type: ClusterIP
  selector:
    app: threads-web
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
