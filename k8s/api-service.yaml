# ── k8s/api-service.yaml ──────────────────────────────────────────────────────
# Named "api" so the nginx pod's proxy_pass http://api:8000 resolves (matches
# the docker-compose service name too).
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: threads
  labels:
    app: threads-api
spec:
  type: ClusterIP
  selector:
    app: threads-api
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
