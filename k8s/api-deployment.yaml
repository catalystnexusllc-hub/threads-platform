# ── k8s/api-deployment.yaml ───────────────────────────────────────────────────
# FastAPI (uvicorn) API tier. Stateless → multi-replica + RollingUpdate.
# Connects to the in-cluster Postgres via DATABASE_URL. Migrations + seed run
# on startup, serialized across replicas by a pg_advisory_lock (see app/db.py).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: threads
  labels:
    app: threads-api
    version: "2.4.1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: threads-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: threads-api
        version: "2.4.1"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: api
          image: ghcr.io/catalystnexus/threads-api:2.4.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: threads-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: threads-secret
                  key: DATABASE_URL
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: threads-secret
                  key: API_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
